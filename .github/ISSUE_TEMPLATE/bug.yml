name: Bug
description: Ошибка, сбой или некорректное поведение
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Проблема
      description: Что сломано
      placeholder: Кратко опиши ошибку
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Ожидаемое поведение
      description: Что должно происходить
      placeholder: Опиши правильное поведение
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Фактическое поведение
      description: Что происходит сейчас
      placeholder: Опиши текущее поведение
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Шаги воспроизведения
      description: Как воспроизвести проблему
      placeholder: 1. ... 2. ... 3. ...
    validations:
      required: true

  - type: textarea
    id: affected
    attributes:
      label: Затронутые файлы и зоны
      description: Какие модули, сервисы или папки связаны с багом
      placeholder: api/, frontend/, docker-compose.yml, dev_tools_system/ ...
    validations:
      required: false

  - type: textarea
    id: dod
    attributes:
      label: Definition of Done
      description: Когда баг считается исправленным
      placeholder: Что должно измениться, чтобы задача считалась закрытой
    validations:
      required: true

  - type: textarea
    id: tests
    attributes:
      label: Проверки и тесты
      description: Какие проверки подтвердят исправление
      placeholder: pytest, smoke test, ручная проверка сценария, verify.sh
    validations:
      required: true
