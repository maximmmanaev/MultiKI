name: ci

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make verify executable
        run: chmod +x dev_tools_system/scripts/verify.sh

      - name: Run verify
        run: ./dev_tools_system/scripts/verify.sh
