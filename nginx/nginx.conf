events {
    worker_connections 1024;
}

http {
    server {
        listen 443 ssl;
        server_name localhost multiki.local;

        ssl_certificate /etc/nginx/certs/multiki.crt;
        ssl_certificate_key /etc/nginx/certs/multiki.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        # Основной трафик → API
        location / {
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Health check
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }

    # HTTP → HTTPS редирект
    server {
        listen 80;
        server_name localhost multiki.local;
        return 301 https://$host$request_uri;
    }
}
