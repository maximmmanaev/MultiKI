events { worker_connections 1024; }

http {
    server {
        listen 443 ssl;
        server_name localhost;
        
        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        # 🔹 Фронтенд (статика)
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # 🔹 Прокси ВСЕХ /api/ запросов в бэкенд
        location /api/ {
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Увеличиваем таймауты для долгих операций (docker compose)
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # 🔹 Отдельные эндпоинты (если нужно)
        location /health { proxy_pass http://api:8000; }
        location /docs { proxy_pass http://api:8000; }
        location /openapi.json { proxy_pass http://api:8000; }
    }
}
